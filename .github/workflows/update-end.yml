name: Update end date for bangumi

on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: current-time
        uses: srfrnk/current-time@5a4163ad035ccd9a407ec9e519c3b6ba1b633d1e
        with:
          format: X

      - name: Set branch name
        id: branch-name
        run: echo "::set-output name=result::$BRANCH_NAME"
        env:
          BRANCH_NAME: 'update-end-${{ steps.current-time.outputs.formattedTime }}'

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create a new branch
        run: git checkout -b ${STEPS_BRANCH_NAME_OUTPUTS_RESULT}
        env:
          STEPS_BRANCH_NAME_OUTPUTS_RESULT: ${{ steps.branch-name.outputs.result }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Run bdh to update end date
        run: npx bangumi-data-helper end

      - name: Commit changes
        id: commit-changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Update end date
          branch: ${{ steps.branch-name.outputs.result }}

      - name: Create pull request
        if: steps.commit-changes.outputs.changes_detected == 'true'
        run: |
          gh pr create -r $REVIEWER -a $REVIEWER -t "Auto end date update" -b "${STEPS_CURRENT_TIME_OUTPUTS_FORMATTEDTIME}"
        env:
          REVIEWER: wxt2005
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_CURRENT_TIME_OUTPUTS_FORMATTEDTIME: ${{ steps.current-time.outputs.formattedTime }}
